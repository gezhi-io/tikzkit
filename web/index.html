<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikZ Block Renderer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231f2937'/%3E%3Cpath d='M8 9h16M8 16h16M8 23h10' stroke='%23ffffff' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/web/styles.css" />
    <link rel="stylesheet" href="/node_modules/katex/dist/katex.min.css" />
    <script type="importmap">
      {
        "imports": {
          "chevrotain": "/node_modules/chevrotain/lib/chevrotain.mjs",
          "katex": "/node_modules/katex/dist/katex.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="TikZ renderer workspace">
        <header class="topbar">
          <div>
            <h1>TikZ Block Renderer</h1>
            <p>Use fenced <code>tikz</code> blocks and render them in-page as SVG.</p>
          </div>
          <div class="actions">
            <label class="gallery-select">
              <span>案例集</span>
              <select id="gallery-source-select">
                <option value="core">核心 gallery</option>
              </select>
            </label>
            <span id="gallery-source-status" class="muted">core</span>
            <div class="view-toggle" aria-label="Workspace view">
              <button id="results-view-button" type="button" class="secondary active">渲染结果</button>
              <button id="source-view-button" type="button" class="secondary">源码编辑</button>
            </div>
            <label class="strict-toggle">
              <input id="strict-mode" type="checkbox" />
              Strict
            </label>
            <button id="reset-button" type="button" class="secondary">Reset</button>
            <button id="render-button" type="button">Render</button>
          </div>
        </header>

        <div class="panes">
          <section class="pane editor-pane" aria-label="Markdown editor">
            <div class="pane-header">
              <span>Markdown</span>
              <span id="source-count" class="muted">0 blocks</span>
            </div>
            <textarea id="source-input" spellcheck="false"></textarea>
          </section>

          <section class="pane preview-pane" aria-label="Rendered preview">
            <div class="pane-header">
              <span>Preview</span>
              <span id="status-line" class="muted">Ready</span>
            </div>
            <div id="preview" class="preview"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/web/app.js"></script>
  </body>
</html>
